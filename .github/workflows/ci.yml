name: CI

on:
  push:
    branches:
      - master
      - 2.0.x
  pull_request:
    branches:
      - master
      - 2.0.x
  workflow_dispatch:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt update -y
          sudo apt install -y lsb-release wget software-properties-common gnupg
          max_retries=5
          retry_delay=2
          tmp_key=$(mktemp)
          success=false
          
          for i in $(seq 1 $max_retries); do
            echo "Attempt $i of $max_retries to fetch LLVM GPG key..."
            if wget --timeout=10 --tries=1 -O "$tmp_key" https://apt.llvm.org/llvm-snapshot.gpg.key 2>&1; then
              echo "✓ Successfully fetched GPG key on attempt $i"
              success=true
              break
            else
              if [ $i -eq $max_retries ]; then
                echo "✗ Failed after $max_retries attempts"
                rm -f "$tmp_key"
                exit 1
              else
                echo "  Attempt $i failed, retrying in ${retry_delay}s..."
                sleep $retry_delay
                retry_delay=$((retry_delay * 2))
              fi
            fi
          done
          
          if [ "$success" = true ]; then
            cat "$tmp_key" | sudo gpg --dearmor -o /usr/share/keyrings/llvm-snapshot.gpg
            rm -f "$tmp_key"
          fi
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt update -y
          sudo apt remove -y clang-format 2>/dev/null || true
          sudo apt install -y clang-format-21
          sudo ln -sf /usr/bin/clang-format-21 /usr/bin/clang-format

      - name: Check code formatting
        run: |
          ./clang-format.sh
          if ! git diff --quiet; then
            git diff
            echo ""
            echo "Please run './clang-format.sh' and commit the changes."
            exit 1
          fi

  build-linux:
    needs: [format-check]
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:10
    timeout-minutes: 30
    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          dnf -y install dnf-plugins-core
          dnf config-manager --set-enabled crb
          dnf -y install epel-release
          dnf -y install \
            git gcc clang clang-tools-extra cmake make \
            openssl openssl-devel \
            systemd systemd-devel zlib zlib-devel \
            libzstd libzstd-devel lz4 lz4-devel \
            libatomic liburing liburing-devel \
            python3-docutils bzip2 bzip2-devel \
            check check-devel llvm \
            libasan libubsan \
            net-tools procps-ng \
            util-linux sudo which

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install PostgreSQL
        run: |
          dnf install -y https://download.postgresql.org/pub/repos/yum/reporpms/EL-10-x86_64/pgdg-redhat-repo-latest.noarch.rpm
          dnf -qy module disable postgresql 2>/dev/null || true
          dnf install -y postgresql17 postgresql17-server postgresql17-contrib postgresql17-libs postgresql17-devel

      - name: Set Env Path Variable for PostgreSQL
        run: |
          echo "PATH=/usr/pgsql-17/bin:$PATH" >> $GITHUB_ENV
          echo $PATH

      - name: Build Project
        run: |
          mkdir build
          cd build
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            export CC=/usr/bin/gcc
          else
            export CC=/usr/bin/clang
          fi

          cmake -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DDOCS=FALSE ..
           make -j$(nproc)

      - name: Create test user
        run: |
          useradd -m -s /bin/bash runner
          echo "runner ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          chown -R runner:runner $GITHUB_WORKSPACE

      - name: Testsuite
        id: test
        run: |
          # Ensure /tmp directories are writable by runner
          mkdir -p /tmp/pgagroal-test/log /tmp/pgagroal-test/pg_log /tmp/pgagroal-test/coverage
          chown -R runner:runner /tmp/pgagroal-test

          # Build the test command with appropriate env vars
          TEST_ENV="export PATH=/usr/pgsql-17/bin:\$PATH"

          if [ "${{ matrix.compiler }}" = "clang" ] && [ "${{ matrix.build_type }}" = "Debug" ]; then
            TEST_ENV="$TEST_ENV && export LLVM_PROFILE_FILE='/tmp/pgagroal-test/coverage/code-%p.profraw'"
          fi

          if [ "${{ matrix.compiler }}" = "gcc" ] && [ "${{ matrix.build_type }}" = "Debug" ]; then
            # On Rocky Linux, gcc -print-file-name=libasan.so returns a linker script stub.
            # Find the actual versioned DSO instead.
            ASAN_LIB=$(find /usr/lib64 -name 'libasan.so.*' -not -name '*.py' 2>/dev/null | head -1)
            if [ -n "$ASAN_LIB" ] && [ -f "$ASAN_LIB" ]; then
              echo "Using GCC AddressSanitizer preload: $ASAN_LIB"
              TEST_ENV="$TEST_ENV && export ASAN_OPTIONS=detect_leaks=0,verify_asan_link_order=0 && export LD_PRELOAD=$ASAN_LIB"
            fi
          fi

          su - runner -c "cd $GITHUB_WORKSPACE && $TEST_ENV && bash ./build/check.sh run-configs-ci-nonbuild"

      - name: Report coverage summary
        if: matrix.compiler == 'clang' && matrix.build_type == 'Debug'
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/pgagroal-test/coverage/coverage-report-*.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload All Coverage Reports as Artifact
        if: matrix.compiler == 'clang' && matrix.build_type == 'Debug'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-reports-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: /tmp/pgagroal-test/coverage
          retention-days: 90

      - name: Upload Build and Run Logs as Artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: logs-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
           ${{ github.workspace }}/log
           /tmp/pgagroal-test/*
          retention-days: 90

  build-macos:
    needs: [format-check]
    runs-on: macos-latest
    env:
      PGAGROAL_ROOT: ${{ github.workspace }}
      BUILD_DIR: ${{ github.workspace }}/build
      POSTGRESQL_VERSION: "@17"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew update
          brew install openssl libev zstd lz4 libssh bzip2 docutils check graphviz doxygen

      - name: Configure and build with clang
        run: |
          export OPENSSL_ROOT_DIR=$(brew --prefix openssl)
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug ..
          make -j$(sysctl -n hw.ncpu)

  build-freebsd:
    needs: [format-check]
    runs-on: ubuntu-latest
    name: FreeBSD Build and Test
    timeout-minutes: 30
    strategy:
      matrix:
        compiler: [clang]
        build_type: [Debug, Release]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
      - name: Install QEMU dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            libvirt-daemon-system \
            libvirt-clients \
            bridge-utils
          sudo systemctl start libvirtd
      - name: Setup FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        id: freebsd-vm
        with:
          release: "14.3"
          usesh: true
          envs: "PATH,GITHUB_ENV,GITHUB_WORKSPACE,GITHUB_OUTPUT"
          mem: 4096
          sync: rsync
          copyback: true
          run: |
            # System bootstrap
            ASSUME_ALWAYS_YES=yes pkg bootstrap
            pkg update
            pkg upgrade -y
            # Base dependencies
            pkg install -y \
              bash \
              sudo \
              libev \
              cmake \
              postgresql17-server \
              postgresql17-contrib \
              zstd \
              liblz4 \
              bzip2 \
              libssh \
              libarchive \
              check \
              py311-docutils \
              curl \
              doxygen \
              hs-pandoc \
              texlive-base \
              texlive-texmf \
              graphviz
            # Initialize Graphviz plugins after installation
            dot -c
      - name: Build Project
        shell: freebsd {0}
        run: |
          mkdir -p $GITHUB_WORKSPACE/build
          cd $GITHUB_WORKSPACE/build
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} "$GITHUB_WORKSPACE"
          make -j$(sysctl -n hw.ncpu)

  build-rpm:
    needs: [format-check]
    uses: ./.github/workflows/rpm-build.yml
