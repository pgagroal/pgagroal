[pgagroal]
host = localhost
port = 2345

log_type = file
log_level = debug5
log_path = test.log

metrics = 2346

# max_connections is set above 2 * mydb max_size so the per-rule max_size cap
# (not the global max_connections gate) is the binding constraint when
# test_pgagroal_pool_max_size_cap oversubscribes the rule with 2 * max_size
# concurrent holds.
max_connections = 24
blocking_timeout = 10
idle_timeout = 600
validation = off
unix_socket_dir = /tmp/
pipeline = performance


[primary]
host = localhost
port = 5432
