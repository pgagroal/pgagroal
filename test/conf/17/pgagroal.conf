[pgagroal]
host = localhost
port = 2345

log_type = file
log_level = debug5
log_path = test.log

# Short blocking_timeout makes the retry-path regression for #875
# fail quickly when present: clients exceeding max_connections must
# acquire freed slots before blocking_timeout fires.
max_connections = 8
blocking_timeout = 10
idle_timeout = 600
validation = off
unix_socket_dir = /tmp/
pipeline = performance


[primary]
host = localhost
port = 5432
