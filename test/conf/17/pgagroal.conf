[pgagroal]
host = localhost
port = 2345

log_type = file
log_level = debug5
log_path = test.log

# Saturation regression for retry-path slot acquisition (issue #875).
# Small cap with short blocking_timeout makes the retry path's behaviour
# observable: clients exceeding the cap must acquire freed slots before
# blocking_timeout fires.
max_connections = 6
blocking_timeout = 10
idle_timeout = 600
validation = off
unix_socket_dir = /tmp/
pipeline = performance


[primary]
host = localhost
port = 5432
